# KCHIMBO+ — Netlify Static Site Config

[build]
  publish = "."

[build.environment]
  NETLIFY_NEXT_PLUGIN_SKIP = "true"
  NEXT_PLUGIN_FORCE_RUN = "false"

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=0, must-revalidate"
